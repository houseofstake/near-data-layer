specVersion: v0.1.0
package:
  name: 'near-substreams-sql-sink'
  version: v0.1.0

protobuf:
  files:
    - block_meta.proto
  importPaths:
    - ./proto

imports:
  sql: https://github.com/streamingfast/substreams-sink-sql/releases/download/protodefs-v1.0.3/substreams-sink-sql-protodefs-v1.0.3.spkg
  near: https://github.com/streamingfast/firehose-near/releases/download/v2.2.0/substreams-near-v2.2.0.spkg

binaries:
  default:
    type: wasm/rust-v1
    file: target/wasm32-unknown-unknown/release/near_substreams_sql_sink.wasm

modules:
  - name: store_block_meta
    kind: store
    updatePolicy: set_if_not_exists
    valueType: proto:near.block_meta.v1.BlockMeta
    inputs:
      - source: sf.near.type.v1.Block

  - name: store_chunk_meta
    kind: store
    updatePolicy: set_if_not_exists
    valueType: proto:near.block_meta.v1.ChunkMeta
    inputs:
      - source: sf.near.type.v1.Block

  - name: db_out
    kind: map
    inputs:
      - store: store_block_meta
        mode: deltas
      - store: store_chunk_meta
        mode: deltas
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges

network: mainnet

sink:
  module: db_out
  type: sf.substreams.sink.sql.v1.Service
  config:
    schema: "./schema.sql"
    wire_protocol_access: true
    engine: postgres