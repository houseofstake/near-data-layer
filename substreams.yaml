specVersion: v0.1.0
package:
  name: 'near-substreams-sql-sink'
  version: v0.1.0

protobuf:
  files:
    - entities.proto
  importPaths:
    - ./proto

imports:
  sql: https://github.com/streamingfast/substreams-sink-sql/releases/download/protodefs-v1.0.3/substreams-sink-sql-protodefs-v1.0.3.spkg
  near: https://github.com/streamingfast/firehose-near/releases/download/v2.2.0/substreams-near-v2.2.0.spkg

binaries:
  default:
    type: wasm/rust-v1
    file: target/wasm32-unknown-unknown/release/near_substreams_sql_sink.wasm

modules:
  - name: store_block
    kind: store
    initialBlock: 194070330
    updatePolicy: set_if_not_exists
    valueType: proto:near.entities.v1.Block
    inputs:
      - source: sf.near.type.v1.Block

  - name: store_chunk
    kind: store
    initialBlock: 194070330
    updatePolicy: set_if_not_exists
    valueType: proto:near.entities.v1.Chunk
    inputs:
      - source: sf.near.type.v1.Block

  - name: store_receipt
    kind: store
    initialBlock: 194070330
    updatePolicy: set_if_not_exists
    valueType: proto:near.entities.v1.Receipt
    inputs:
      - source: sf.near.type.v1.Block

  - name: store_receipt_action
    kind: store
    initialBlock: 194070330
    updatePolicy: set_if_not_exists
    valueType: proto:near.entities.v1.ReceiptAction
    inputs:
      - source: sf.near.type.v1.Block

  - name: store_execution_outcome
    kind: store
    initialBlock: 194070330
    updatePolicy: set_if_not_exists
    valueType: proto:near.entities.v1.ExecutionOutcome
    inputs:
      - source: sf.near.type.v1.Block

  - name: db_out
    kind: map
    initialBlock: 194070330
    inputs:
      - store: store_block
        mode: deltas
      - store: store_chunk
        mode: deltas
      - store: store_receipt
        mode: deltas
      - store: store_receipt_action
        mode: deltas
      - store: store_execution_outcome
        mode: deltas
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges

network: testnet

sink:
  module: db_out
  type: sf.substreams.sink.sql.v1.Service
  config:
    schema: "./schema.sql"
    wire_protocol_access: true
    engine: postgres