# DEVELOPMENT Configuration for NEAR Indexer
# This configuration file provides development environment values for the NEAR indexer running on mainnet.
# Values marked with "set_in_env" and any other settings can be overridden
# by environment variables using the format "INDEXER_{SECTION}_{KEY}"
# For example: INDEXER_DB_HOST=localhost will override db_host

# Database Configuration - set via environment variables
# db_host, db_database, db_username, db_password set via INDEXER_* env vars
db_database = "postgres"
db_port = 5432
db_schema = "fastnear"
db_max_connections = 16

# Indexer Configuration
start_block = 167570560 # the latest mainnet test contract starts at 167,570,566 https://nearblocks.io/txns/8UZZbLJB74f7CpUMY3xNbmNLLJJNDqQJedDJnyVbyHfv
poll_interval = 2 # this is the timeout
retry_delay = 1
num_threads = 32

# Other
log_level = "info"
app_version = "v1.0.0"

# DataDog Configuration - set via environment variables
# dd_api_key, environment, dd_environment set via INDEXER_* env vars  
datadog_enabled = true

# Contract Configuration
hos_contract = 'voteagora.near'
venear_contract_prefix = 'vt'
voting_contract_prefix = 'vote-dev'
