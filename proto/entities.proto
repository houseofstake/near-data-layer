message Receipt {
  uint64 height = 1;
  string block_hash = 2;
  string chunk_hash = 3;
  string receipt_id = 4;
  string predecessor_id = 5;
  string receiver_id = 6;
  string receipt_kind = 7;
  string author = 8;
}

message Transaction {
  uint64 height = 1;
  string hash = 2;
  string signer_id = 3;
  string public_key = 4;
  uint64 nonce = 5;
  string receiver_id = 6;
  string signature = 7;
  uint64 gas_used = 8;
  string tokens_burnt = 9;
  string executor_id = 10;
  string status = 11;
}

message TransactionAction {
  uint64 height = 1;
  string transaction_hash = 2;
  string action_type = 3;
  string method_name = 4;
  string args = 5;
  uint64 gas = 6;
  string deposit = 7;
  string stake = 8;
  string public_key = 9;
  string beneficiary_id = 10;
  string code = 11;
}

message ReceiptAction {
  string id = 17; // Unique ID as primary key (receipt_id + action_index)
  uint64 block_height = 1;
  string receipt_id = 2;
  string signer_account_id = 3;
  string signer_public_key = 4;
  string gas_price = 5;
  string action_kind = 6;
  string predecessor_id = 7;
  string receiver_id = 8;
  string block_hash = 9;
  string chunk_hash = 10;
  string author = 11;
  // Additional fields for specific action types
  string method_name = 12;
  uint64 gas = 13;
  string deposit = 14;
  string args_base64 = 15; // Base64 encoded args for FunctionCall
  uint32 action_index = 16; // Index of this action within the receipt
  string block_timestamp = 18; // Timestamp from the block header
}

message ExecutionOutcome {
  uint64 block_height = 1;
  string block_hash = 2;
  string chunk_hash = 3;
  string shard_id = 4;
  uint64 gas_burnt = 5;
  float gas_used = 6;
  float tokens_burnt = 7;
  string executor_account_id = 8;
  string status = 9;
  repeated string outcome_receipt_ids = 10; // Will be stored as TEXT[] in PostgreSQL
  string receipt_id = 11;
  string executed_in_block_hash = 12;
  repeated string logs = 13;
}
